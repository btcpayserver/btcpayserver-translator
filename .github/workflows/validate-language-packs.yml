name: Validate Language Packs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-language-packs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore btcpayserver-translator.sln

      - name: Build
        run: dotnet build btcpayserver-translator.sln --no-restore

      - name: Test
        run: dotnet test btcpayserver-translator.sln --no-build --verbosity normal

      - name: Validate Translation Packs
        run: dotnet run --project BTCPayTranslator.csproj --no-build -- validate-packs
